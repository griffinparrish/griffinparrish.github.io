<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RSO Creative Services — Griffin Parrish</title>
<meta name="description" content="Graphic design work Griffin Parrish created for registered student organizations at Washington State University.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0B0C0E;
    --panel:#141619;
    --text:#EDEDEA;
    --rule:#26292D;
    --amber:#E5655D;
    --muted:#8B8F94;
    --maxw:1100px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--ink);
    color:var(--text);
    font-family:'Google Sans Flex', sans-serif;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  a{color:inherit; text-decoration:none;}
  .wrap{max-width:var(--maxw); margin:0 auto; padding:0 32px;}

  header{
    position:sticky; top:0; z-index:50;
    background:rgba(11,12,14,0.85);
    backdrop-filter:blur(10px);
    border-bottom:1px solid var(--rule);
  }
  nav.wrap{
    display:flex; align-items:center; justify-content:space-between;
    padding-top:18px; padding-bottom:18px;
  }
  .brand{
    font-size:18px;
    font-weight:700;
    display:flex; align-items:center; gap:10px;
  }  .back{
    font-family:'IBM Plex Mono', monospace;
    font-size:12.5px;
    color:var(--muted);
  }
  .back:hover{color:var(--amber);}

  .page-head{
    padding:70px 0 40px;
  }
  .page-head .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.14em;
    color:var(--muted);
    margin-bottom:16px;
  }
  .page-head h1{
    font-size:clamp(30px, 5vw, 46px);
    font-weight:700;
  }
  .page-head h1 .accent{ color:var(--amber); }

  .gallery{
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    gap:2px;
    background:var(--rule);
    border:1px solid var(--rule);
    margin-bottom:90px;
  }
  .gallery img{
    width:100%;
    height:100%;
    display:block;
    object-fit:cover;
    background:var(--panel);
  }
  .gallery a{ display:block; overflow:hidden; }
  .gallery img{ transition:transform 0.3s ease; }
  .gallery a:hover img{ transform:scale(1.03); }

  footer{
    padding:40px 0 50px;
    border-top:1px solid var(--rule);
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    color:var(--muted);
    display:flex; justify-content:space-between; flex-wrap:wrap; gap:10px;
  }

  @media (max-width:640px){
    .gallery{grid-template-columns:1fr;}
  }
</style>
</head>
<body>

<header>
  <nav class="wrap">
    <div class="brand">Griffin Parrish</div>
    <a href="../index.html#work" class="back">← Back to site</a>
  </nav>
</header>

<div class="page-head wrap">
  <div class="eyebrow">Design — RSO Creative Services</div>
  <h1>RSO Creative Services</h1>
</div>

<div class="wrap">
  <div class="gallery">
    <a href="rso-01-retro-gallery.jpg" target="_blank"><img src="rso-01-retro-gallery.jpg" alt="Retro Gallery event poster"></a>
    <a href="rso-02-photo-contest.jpg" target="_blank"><img src="rso-02-photo-contest.jpg" alt="Photo Contest poster"></a>
    <a href="rso-03-political-speed-dating.jpg" target="_blank"><img src="rso-03-political-speed-dating.jpg" alt="Political Speed Dating digital sign"></a>
    <a href="rso-04-chat.jpg" target="_blank"><img src="rso-04-chat.jpg" alt="Cougar Health Awareness Team app screen"></a>
    <a href="rso-05-middle-eastern-night.jpg" target="_blank"><img src="rso-05-middle-eastern-night.jpg" alt="Middle Eastern Night event poster"></a>
    <a href="rso-06-boost-into-spring.jpg" target="_blank"><img src="rso-06-boost-into-spring.jpg" alt="Boost Into Spring car show poster"></a>
    <a href="rso-07-cody-ko-noel-miller.jpg" target="_blank"><img src="rso-07-cody-ko-noel-miller.jpg" alt="Cody Ko and Noel Miller event poster"></a>
  </div>
</div>

<footer class="wrap">
  <span>© 2026 Griffin Parrish. New York, NY.</span>
</footer>

</body>
</html>
