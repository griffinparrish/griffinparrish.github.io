<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personal Design — Griffin Parrish</title>
<meta name="description" content="A collection of personal graphic design work by Griffin Parrish, made in the Adobe Suite outside of client or brand work.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0B0C0E;
    --panel:#141619;
    --text:#EDEDEA;
    --rule:#26292D;
    --amber:#E5655D;
    --muted:#8B8F94;
    --maxw:1100px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--ink);
    color:var(--text);
    font-family:'Google Sans Flex', sans-serif;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  a{color:inherit; text-decoration:none;}
  .wrap{max-width:var(--maxw); margin:0 auto; padding:0 32px;}

  header{
    position:sticky; top:0; z-index:50;
    background:rgba(11,12,14,0.85);
    backdrop-filter:blur(10px);
    border-bottom:1px solid var(--rule);
  }
  nav.wrap{
    display:flex; align-items:center; justify-content:space-between;
    padding-top:18px; padding-bottom:18px;
  }
  .brand{
    font-size:18px;
    font-weight:700;
    display:flex; align-items:center; gap:10px;
  }
  .brand img{ height:30px; width:auto; display:block; }
  .brand span{color:var(--amber);}
  .back{
    font-family:'IBM Plex Mono', monospace;
    font-size:12.5px;
    color:var(--muted);
  }
  .back:hover{color:var(--amber);}

  .page-head{
    padding:70px 0 40px;
  }
  .page-head .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.14em;
    color:var(--muted);
    margin-bottom:16px;
  }
  .page-head h1{
    font-size:clamp(30px, 5vw, 46px);
    font-weight:700;
  }
  .page-head h1 .accent{ color:var(--amber); }

  .gallery{
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    gap:2px;
    background:var(--rule);
    border:1px solid var(--rule);
    margin-bottom:90px;
  }
  .gallery img{
    width:100%;
    height:100%;
    display:block;
    object-fit:cover;
    background:var(--panel);
  }
  .gallery a{ display:block; overflow:hidden; }
  .gallery img{ transition:transform 0.3s ease; }
  .gallery a:hover img{ transform:scale(1.03); }

  footer{
    padding:40px 0 50px;
    border-top:1px solid var(--rule);
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    color:var(--muted);
    display:flex; justify-content:space-between; flex-wrap:wrap; gap:10px;
  }

  @media (max-width:640px){
    .gallery{grid-template-columns:1fr;}
  }
</style>
</head>
<body>

<header>
  <nav class="wrap">
    <div class="brand"><img src="../griffin-logo.png" alt="Griffin Parrish logo">Griffin Parrish<span>.</span></div>
    <a href="../index.html#work" class="back">← Back to site</a>
  </nav>
</header>

<div class="page-head wrap">
  <div class="eyebrow">Design — Personal Work</div>
  <h1>Personal <span class="accent">Design</span></h1>
</div>

<div class="wrap">
  <div class="gallery">
    <a href="personal/personal-01-griffin-parrish-record.jpg" target="_blank"><img src="personal/personal-01-griffin-parrish-record.jpg" alt="Griffin Parrish record label design"></a>
    <a href="personal/personal-02-scatterbrained-mirror.jpg" target="_blank"><img src="personal/personal-02-scatterbrained-mirror.jpg" alt="Scatterbrained mirrored wordmark"></a>
    <a href="personal/personal-03-scatterbrained-pug.jpg" target="_blank"><img src="personal/personal-03-scatterbrained-pug.jpg" alt="Scatterbrained logo with pug photo"></a>
    <a href="personal/personal-04-scatterbrained-jump.jpg" target="_blank"><img src="personal/personal-04-scatterbrained-jump.jpg" alt="Scatterbrained logo with jumping figure"></a>
    <a href="personal/personal-05-scatterbrained-retro.jpg" target="_blank"><img src="personal/personal-05-scatterbrained-retro.jpg" alt="Scatterbrained retro badge logo"></a>
    <a href="personal/personal-06-scatterbrained-stickers.jpg" target="_blank"><img src="personal/personal-06-scatterbrained-stickers.jpg" alt="Scatterbrained sticker color variations"></a>
    <a href="personal/personal-07-scatterbrained-brain.jpg" target="_blank"><img src="personal/personal-07-scatterbrained-brain.jpg" alt="Scatterbrained brain-shaped logo"></a>
    <a href="personal/personal-08-scatterbrained-peace.jpg" target="_blank"><img src="personal/personal-08-scatterbrained-peace.jpg" alt="Scatterbrained logo with peace sign"></a>
  </div>
</div>

<footer class="wrap">
  <span>© 2026 Griffin Parrish. New York, NY.</span>
  <a href="../index.html" class="back">griffinparrish.com</a>
</footer>

</body>
</html>
